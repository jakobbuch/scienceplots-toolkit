repos:
  - repo: local
    hooks:
      - id: pytest
        name: pytest
        entry: uv run pytest tests/ -v
        language: system
        pass_filenames: false
        stages: [commit]

      - id: pytest-visual
        name: pytest-visual
        entry: uv run pytest tests/test_visual_baselines.py -v
        language: system
        pass_filenames: false
        stages: [push]
